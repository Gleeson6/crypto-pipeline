services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gleezon
      POSTGRES_PASSWORD: crypto123
      POSTGRES_DB: cryptodb
    volumes:
      - timescale_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - timescaledb
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: crypto123
    volumes:
      - grafana_data:/var/lib/grafana

  # --- Airflow: dedicated PostgreSQL for Airflow's internal metadata ---
  airflow_db:
    image: postgres:15
    container_name: airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow123
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # --- Airflow Init ---
  # Runs once on startup to initialise the Airflow database schema and
  # create the admin user. Once done it exits — it's not a long-running service.
  # The webserver and scheduler wait for this to complete before starting.
  airflow_init:
    image: apache/airflow:2.9.1
    container_name: airflow_init
    depends_on:
      airflow_db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow_db/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: crypto_pipeline_secret
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: crypto123
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password crypto123 --firstname Gleezon --lastname Admin --role Admin --email gleesonminoy7@gmail.com || true"

  # --- Airflow Webserver ---
  airflow_webserver:
    image: apache/airflow:2.9.1
    container_name: airflow_webserver
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow_db/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: crypto_pipeline_secret
    volumes:
      - ./dags:/opt/airflow/dags
    command: webserver

  # --- Airflow Scheduler ---
  airflow_scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow_scheduler
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow123@airflow_db/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: crypto_pipeline_secret
    volumes:
      - ./dags:/opt/airflow/dags
    command: scheduler

volumes:
  timescale_data:
  grafana_data:
  airflow_db_data:
